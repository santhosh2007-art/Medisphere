spring.application.name=gatewayservice

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# SMART on FHIR / OAuth2 - the Gateway acts as a Resource Server and validates
# JWT access tokens issued by the Keycloak "medisphere" realm (see docker-compose.yml).
# NOTE: Keycloak runs on port 8181 (host) to avoid clashing with fhirservice (port 8085).
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/medisphere

# Patient Service (CRUD)
spring.cloud.gateway.routes[0].id=patient-service
spring.cloud.gateway.routes[0].uri=lb://patient-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/patient/**

# Patient 360 Dashboard
spring.cloud.gateway.routes[1].id=patient360-service
spring.cloud.gateway.routes[1].uri=lb://patient-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/patient360/**

# Audit Log
spring.cloud.gateway.routes[2].id=audit-service
spring.cloud.gateway.routes[2].uri=lb://patient-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/audit/**

# Health Twin Service
spring.cloud.gateway.routes[3].id=healthtwin-service
spring.cloud.gateway.routes[3].uri=lb://healthtwinservice
spring.cloud.gateway.routes[3].predicates[0]=Path=/healthtwin/**

# Vitals Service
spring.cloud.gateway.routes[4].id=vitals-service
spring.cloud.gateway.routes[4].uri=lb://vitalsservice
spring.cloud.gateway.routes[4].predicates[0]=Path=/vitals/**

# Consent Service
spring.cloud.gateway.routes[5].id=consent-service
spring.cloud.gateway.routes[5].uri=lb://consentservice
spring.cloud.gateway.routes[5].predicates[0]=Path=/consent/**

# FHIR Service
spring.cloud.gateway.routes[6].id=fhir-service
spring.cloud.gateway.routes[6].uri=lb://fhirservice
spring.cloud.gateway.routes[6].predicates[0]=Path=/fhir/**
