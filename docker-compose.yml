version: "3.8"

services:

  # ---------- MongoDB: stores Patient, Vitals, HealthTwin, Consent, AuditLog documents ----------
  mongodb:
    image: mongo:7
    container_name: medisphere-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # ---------- Kafka (with Zookeeper): streams wearable device vitals data ----------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: medisphere-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: medisphere-kafka
    depends_on:
      - zookeeper
    ports:
      - "9192:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9192
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ---------- Keycloak: SMART on FHIR / OAuth2 authorization server ----------
  # Runs on host port 8181 so it does not clash with fhirservice (port 8085).
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: medisphere-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8181:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json

volumes:
  mongo-data:
